<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Idol: Ultra Detail Edition</title>
    <style>
        :root {
            --hair-1: #ff4500; --hair-2: #d32f2f; --hair-3: #ff8a50;
            --eye-1: #00ff88; --eye-2: #004d40;
            --skin-1: #fff1e0; --skin-2: #f7d7bc;
            --dress-1: #1b5e20; --dress-2: #4caf50;
            --stage-glow: rgba(0, 255, 136, 0.2);
        }

        body {
            margin: 0; overflow: hidden;
            background: #050510;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Segoe UI', sans-serif;
        }

        /* --- STAGE EFFECTS --- */
        #stage {
            position: relative; width: 600px; height: 800px;
            display: flex; flex-direction: column; align-items: center;
        }

        .floor {
            position: absolute; bottom: 50px; width: 400px; height: 100px;
            background: radial-gradient(ellipse, var(--stage-glow) 0%, transparent 70%);
            border-radius: 50%; transform: scaleY(0.3); z-index: 0;
        }

        /* --- CHARACTER CONTAINER --- */
        #character-wrapper {
            position: relative; width: 400px; height: 600px;
            z-index: 10; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom center;
        }

        /* --- HAIR ANIMATIONS --- */
        .hair-strand { animation: hairSway 3s infinite ease-in-out; transform-origin: top center; }
        @keyframes hairSway {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1.5deg); }
        }

        /* --- EYE BLINK --- */
        .eyelid { animation: blink 5s infinite; transform-origin: center; }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0); }
        }

        /* --- DANCE POSES --- */
        .pose-left { transform: rotate(-5deg) translateX(-30px); }
        .pose-right { transform: rotate(5deg) translateX(30px); }
        .pose-up { transform: translateY(-20px) scale(1.05); }
        .pose-down { transform: scaleY(0.9) translateY(20px); }

        /* --- UI & FEEDBACK --- */
        .score-display {
            position: absolute; top: 20px; font-size: 32px; font-weight: 900;
            color: white; text-shadow: 0 0 20px var(--eye-1); z-index: 100;
        }

        .combo-text {
            position: absolute; top: 150px; font-size: 50px; font-weight: 900;
            color: #fff; pointer-events: none; opacity: 0;
        }

        .animate-pop { animation: popText 0.5s ease-out forwards; }
        @keyframes popText {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 1; transform: scale(1.2); }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .controls {
            position: absolute; bottom: 20px; color: #555; font-size: 12px;
            letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="score-display">PONTOS: <span id="score-val">0</span></div>
    <div id="combo" class="combo-text">PERFEITO!</div>

    <div id="stage">
        <div class="floor"></div>
        
        <div id="character-wrapper">
            <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
                <!-- Definições de Sombras e Degradês -->
                <defs>
                    <filter id="softGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="100%">
                        <stop offset="0%" stop-color="var(--hair-3)" />
                        <stop offset="50%" stop-color="var(--hair-1)" />
                        <stop offset="100%" stop-color="var(--hair-2)" />
                    </linearGradient>
                    <radialGradient id="eyeIris">
                        <stop offset="0%" stop-color="#fff" />
                        <stop offset="40%" stop-color="var(--eye-1)" />
                        <stop offset="80%" stop-color="var(--eye-2)" />
                        <stop offset="100%" stop-color="#000" />
                    </radialGradient>
                </defs>

                <!-- Cabelo de Fundo (Camada Traseira) -->
                <path d="M120 280 Q80 400 130 550 M280 280 Q320 400 270 550" stroke="var(--hair-2)" stroke-width="30" fill="none" stroke-linecap="round" class="hair-strand" />

                <!-- Braços (Pele com Sombra) -->
                <rect x="130" y="380" width="18" height="100" rx="9" fill="var(--skin-2)" transform="rotate(15 130 380)" />
                <rect x="252" y="380" width="18" height="100" rx="9" fill="var(--skin-2)" transform="rotate(-15 270 380)" />
                <rect x="132" y="380" width="14" height="95" rx="7" fill="var(--skin-1)" transform="rotate(15 132 380)" />
                <rect x="254" y="380" width="14" height="95" rx="7" fill="var(--skin-1)" transform="rotate(-15 268 380)" />

                <!-- Corpo / Vestido Detalhado -->
                <path d="M165 370 L235 370 L290 580 L110 580 Z" fill="var(--dress-1)" />
                <path d="M165 370 L235 370 L250 450 L150 450 Z" fill="var(--dress-2)" opacity="0.6" />
                <path d="M110 580 Q200 550 290 580" fill="none" stroke="#0a3d13" stroke-width="5" />

                <!-- Cabeça -->
                <path d="M150 250 Q150 370 200 370 Q250 370 250 250 Z" fill="var(--skin-2)" />
                <path d="M155 245 Q155 355 200 355 Q245 355 245 245 Z" fill="var(--skin-1)" />

                <!-- Olhos Ultra Detalhados -->
                <g class="eyelid">
                    <!-- Esquerdo -->
                    <ellipse cx="178" cy="290" rx="14" ry="20" fill="#000" />
                    <ellipse cx="178" cy="292" rx="10" ry="16" fill="url(#eyeIris)" />
                    <circle cx="174" cy="282" r="4" fill="#fff" opacity="0.8" />
                    <!-- Direito -->
                    <ellipse cx="222" cy="290" rx="14" ry="20" fill="#000" />
                    <ellipse cx="222" cy="292" rx="10" ry="16" fill="url(#eyeIris)" />
                    <circle cx="218" cy="282" r="4" fill="#fff" opacity="0.8" />
                </g>
                
                <!-- Cabelo Frontal (Camadas e Mechas) -->
                <g class="hair-strand">
                    <path d="M140 250 Q140 130 200 130 Q260 130 260 250" fill="url(#hairGrad)" />
                    <!-- Franja Estilo Anime -->
                    <path d="M140 230 L160 290 L180 230 L200 300 L220 230 L245 285 L260 220" fill="url(#hairGrad)" stroke="var(--hair-2)" stroke-width="1" />
                    <!-- Mechas Laterais -->
                    <path d="M145 230 C120 300 120 400 140 450" fill="none" stroke="url(#hairGrad)" stroke-width="12" stroke-linecap="round" />
                    <path d="M255 230 C280 300 280 400 260 450" fill="none" stroke="url(#hairGrad)" stroke-width="12" stroke-linecap="round" />
                </g>

                <!-- Detalhes de Rosto -->
                <path d="M190 340 Q200 355 210 340" fill="none" stroke="#e57373" stroke-width="2" stroke-linecap="round" /> <!-- Boca -->
                <circle cx="165" cy="320" r="10" fill="#ff8a80" opacity="0.2" filter="url(#softGlow)" /> <!-- Blush -->
                <circle cx="235" cy="320" r="10" fill="#ff8a80" opacity="0.2" filter="url(#softGlow)" />
            </svg>
        </div>

        <div class="controls">SETAS DO TECLADO PARA DANÇAR</div>
    </div>

    <script>
        let score = 0;
        const scoreEl = document.getElementById('score-val');
        const char = document.getElementById('character-wrapper');
        const combo = document.getElementById('combo');

        const moves = {
            'ArrowLeft': 'pose-left',
            'ArrowRight': 'pose-right',
            'ArrowUp': 'pose-up',
            'ArrowDown': 'pose-down'
        };

        document.addEventListener('keydown', (e) => {
            const move = moves[e.key];
            if (move) {
                // Remove classes anteriores
                char.classList.remove('pose-left', 'pose-right', 'pose-up', 'pose-down');
                void char.offsetWidth; // Trigger reflow
                
                // Aplica nova pose
                char.classList.add(move);
                
                // Feedback visual
                score += 150;
                scoreEl.innerText = score;
                showCombo();
                createParticle();

                // Som de "batida" (Opcional - Web Audio API)
                playHitSound();

                // Volta ao estado original
                setTimeout(() => {
                    char.classList.remove(move);
                }, 250);
            }
        });

        function showCombo() {
            combo.classList.remove('animate-pop');
            void combo.offsetWidth;
            combo.classList.add('animate-pop');
        }

        function createParticle() {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.width = '10px';
            p.style.height = '10px';
            p.style.background = 'var(--eye-1)';
            p.style.borderRadius = '50%';
            p.style.left = '50%';
            p.style.top = '50%';
            p.style.boxShadow = '0 0 10px var(--eye-1)';
            p.style.pointerEvents = 'none';
            document.body.appendChild(p);

            const destinationX = (Math.random() - 0.5) * 500;
            const destinationY = (Math.random() - 0.5) * 500;

            p.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' }).onfinish = () => p.remove();
        }

        function playHitSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(120, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }
    </script>
</body>
</html>
