{
  "file": "<!DOCTYPE html>\n<html lang=\"pt-br\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Emerald Idol: High Octane Anime</title>\n    <style>\n        :root {\n            --hair-1: #ff4500; --hair-2: #8b0000; --hair-shine: #ffca28;\n            --eye-1: #00ff88; --eye-shadow: #004d40;\n            --skin: #fff5eb; --skin-shadow: #f5d4bc;\n            --dress: #1b5e20; --dress-light: #2ecc71;\n            --metal: #454d55;\n        }\n\n        body {\n            margin: 0; overflow: hidden; background: #08080f;\n            display: flex; align-items: center; justify-content: center;\n            height: 100vh; font-family: 'Courier New', Courier, monospace;\n            perspective: 1000px;\n        }\n\n        #game-viewport {\n            position: relative; width: 600px; height: 850px; outline: 2px solid #333;\n            background: radial-gradient(circle at center, #1a1a2e 0%, #08080f 100%);\n            display: flex; justify-content: center; align-items: flex-end;\n        }\n\n        #character-wrapper {\n            width: 500px; height: 700px; position: relative;\n            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n            transform-origin: bottom center; z-index: 5;\n        }\n\n        .pose-left { transform: rotate(-5deg) translateX(-40px); }\n        .pose-right { transform: rotate(5deg) translateX(40px); }\n        .pose-up { transform: translateY(-30px) scaleY(1.05); }\n        .pose-down { transform: translateY(15px) scaleY(0.95); }\n        .recoil { animation: kick 0.2s ease-out; }\n\n        @keyframes kick {\n            0% { transform: translateY(0) rotate(0deg); }\n            50% { transform: translateY(10px) rotate(-10deg); }\n            100% { transform: translateY(0) rotate(0deg); }\n        }\n\n        /* --- GUN STYLES --- */\n        #deagle-group {\n            opacity: 0; transition: opacity 0.1s;\n            transform: translate(160px, 300px) scale(0.6);\n        }\n        .showing-gun #deagle-group { opacity: 1; }\n\n        /* --- FLASH EFFECT --- */\n        #muzzle-flash {\n            position: absolute; width: 200px; height: 200px; background: white; \n            border-radius: 50%; top: 300px; left: 180px; mix-blend-mode: screen;\n            opacity: 0; filter: blur(20px); pointer-events: none; z-index: 20;\n        }\n        .flash-anim { animation: flash-hit 0.15s ease-out; }\n        @keyframes flash-hit { 0% { opacity: 1; transform: scale(0.5); } 100% { opacity: 0; transform: scale(2); } }\n\n        .ui-box { position: absolute; top: 30px; left: 30px; color: #fff; z-index: 30; }\n        .combo { font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--eye-1); }\n        \n        /* --- ANIME DETAILING --- */\n        .outline { stroke: #000; stroke-width: 1.5; }\n        .blink { animation: eyeBlink 5s infinite; transform-origin: center 290px; }\n        @keyframes eyeBlink {\n            0%, 90%, 100% { transform: scaleY(1); }\n            95% { transform: scaleY(0); }\n        }\n        .floating { animation: float 3s infinite ease-in-out; }\n        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }\n    </style>\n</head>\n<body>\n\n<div class=\"ui-box\">\n    <div style=\"font-size: 20px;\">MODO: <span id=\"mode-text\">IDOL DANCE</span></div>\n    <div class=\"combo\" id=\"score\">00000</div>\n</div>\n\n<div id=\"game-viewport\">\n    <div id=\"muzzle-flash\"></div>\n    \n    <div id=\"character-wrapper\" class=\"floating\">\n        <svg viewBox=\"0 0 500 700\" xmlns=\"http://www.w3.org/2000/svg\">\n            <defs>\n                <radialGradient id=\"eyeRad\">\n                    <stop offset=\"30%\" stop-color=\"#fff\"/><stop offset=\"60%\" stop-color=\"var(--eye-1)\"/><stop offset=\"100%\" stop-color=\"#000\"/>\n                </radialGradient>\n            </defs>\n\n            <!-- Corpo Base -->\n            <path class=\"outline\" d=\"M220 380 Q250 370 280 380 L320 620 L180 620 Z\" fill=\"var(--dress)\" />\n            <path d=\"M220 380 Q250 370 280 380 L295 440 Q250 430 205 440 Z\" fill=\"rgba(0,0,0,0.15)\"/> <!-- Shadow on dress -->\n\n            <!-- Bracos -->\n            <path class=\"outline\" d=\"M185 390 Q160 450 160 520\" fill=\"none\" stroke=\"var(--skin)\" stroke-width=\"16\" stroke-linecap=\"round\"/>\n            <path id=\"armR\" class=\"outline\" d=\"M315 390 Q340 450 340 520\" fill=\"none\" stroke=\"var(--skin)\" stroke-width=\"16\" stroke-linecap=\"round\"/>\n\n            <!-- Rosto (Desenho Estilo V) -->\n            <path class=\"outline\" d=\"M200 250 Q200 360 250 360 Q300 360 300 250 Z\" fill=\"var(--skin)\" />\n            <path d=\"M205 255 Q205 345 250 345 Q295 345 295 255\" fill=\"none\" stroke=\"var(--skin-shadow)\" stroke-width=\"4\"/>\n\n            <!-- Olhos Anime Ultra Detalhados -->\n            <g class=\"blink\">\n                <ellipse class=\"outline\" cx=\"228\" cy=\"290\" rx=\"16\" ry=\"22\" fill=\"#000\"/>\n                <ellipse cx=\"228\" cy=\"292\" rx=\"12\" ry=\"18\" fill=\"url(#eyeRad)\"/>\n                <circle cx=\"222\" cy=\"280\" r=\"5\" fill=\"#fff\"/>\n\n                <ellipse class=\"outline\" cx=\"272\" cy=\"290\" rx=\"16\" ry=\"22\" fill=\"#000\"/>\n                <ellipse cx=\"272\" cy=\"292\" rx=\"12\" ry=\"18\" fill=\"url(#eyeRad)\"/>\n                <circle cx=\"266\" cy=\"280\" r=\"5\" fill=\"#fff\"/>\n            </g>\n\n            <!-- Cabelo e Franja -->\n            <path class=\"outline\" d=\"M185 240 Q180 120 250 120 Q320 120 315 240 Q330 380 320 500\" fill=\"var(--hair-1)\" stroke-width=\"2\"/>\n            <path d=\"M185 240 Q185 280 215 250 Q240 310 260 240 Q280 300 315 235\" fill=\"var(--hair-1)\" stroke=\"#000\" stroke-width=\"1\"/>\n            <path d=\"M220 145 Q250 135 280 145\" fill=\"none\" stroke=\"var(--hair-shine)\" stroke-width=\"8\" opacity=\"0.4\"/>\n\n            <!-- Desert Eagle Group -->\n            <g id=\"deagle-group\">\n                <rect x=\"-20\" y=\"0\" width=\"120\" height=\"50\" fill=\"var(--metal)\" rx=\"5\" class=\"outline\"/> <!-- Barrel -->\n                <rect x=\"40\" y=\"30\" width=\"40\" height=\"80\" fill=\"var(--metal)\" transform=\"rotate(-15)\" rx=\"5\" class=\"outline\"/> <!-- Grip -->\n                <circle cx=\"5\" cy=\"5\" r=\"3\" fill=\"#000\"/> <!-- Bore -->\n                <path d=\"M30 40 L70 40 L60 60 L40 60 Z\" fill=\"#222\"/> <!-- Trigger guard -->\n            </g>\n        </svg>\n    </div>\n</div>\n\n<script>\n    const char = document.getElementById('character-wrapper');\n    const scoreDisplay = document.getElementById('score');\n    const modeText = document.getElementById('mode-text');\n    const flash = document.getElementById('muzzle-flash');\n    const viewport = document.getElementById('game-viewport');\n\n    let score = 0;\n    let lastDownTime = 0;\n    let shootMode = false;\n\n    const AudioCtx = window.AudioContext || window.webkitAudioContext;\n    const audio = new AudioCtx();\n\n    function playSound(type) {\n        if (audio.state === 'suspended') audio.resume();\n        const osc = audio.createOscillator();\n        const gain = audio.createGain();\n        osc.connect(gain);\n        gain.connect(audio.destination);\n\n        if (type === 'hit') {\n            osc.frequency.setValueAtTime(150, audio.currentTime);\n            osc.frequency.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);\n            gain.gain.setValueAtTime(0.1, audio.currentTime);\n        } else if (type === 'shot') {\n            // Noise-based explosion for gunshot\n            const bufferSize = audio.sampleRate * 0.1;\n            const buffer = audio.createBuffer(1, bufferSize, audio.sampleRate);\n            const data = buffer.getChannelData(0);\n            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;\n            const noise = audio.createBufferSource();\n            noise.buffer = buffer;\n            const nGain = audio.createGain();\n            nGain.gain.setValueAtTime(0.4, audio.currentTime);\n            nGain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.15);\n            noise.connect(nGain);\n            nGain.connect(audio.destination);\n            noise.start();\n            // Sub bass layer\n            osc.frequency.setValueAtTime(60, audio.currentTime);\n            osc.frequency.exponentialRampToValueAtTime(20, audio.currentTime + 0.15);\n        }\n        osc.start();\n        osc.stop(audio.currentTime + 0.2);\n    }\n\n    function performShot() {\n        shootMode = true;\n        modeText.innerText = \"TARGET ELIMINATED\";\n        char.classList.add('showing-gun', 'recoil');\n        flash.classList.add('flash-anim');\n        \n        viewport.style.background = \"white\";\n        setTimeout(() => viewport.style.background = \"\", 50);\n        \n        playSound('shot');\n        \n        setTimeout(() => {\n            char.classList.remove('showing-gun', 'recoil');\n            flash.classList.remove('flash-anim');\n            shootMode = false;\n            modeText.innerText = \"IDOL DANCE\";\n        }, 500);\n    }\n\n    const keys = {\n        'ArrowLeft': 'pose-left', 'a': 'pose-left', 'A': 'pose-left',\n        'ArrowRight': 'pose-right', 'd': 'pose-right', 'D': 'pose-right',\n        'ArrowUp': 'pose-up', 'w': 'pose-up', 'W': 'pose-up',\n        'ArrowDown': 'pose-down', 's': 'pose-down', 'S': 'pose-down'\n    };\n\n    document.addEventListener('keydown', (e) => {\n        if (shootMode) return;\n        const pose = keys[e.key];\n\n        if (pose) {\n            // Double tap Down logic\n            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {\n                const now = Date.now();\n                if (now - lastDownTime < 250) {\n                    performShot();\n                    return;\n                }\n                lastDownTime = now;\n            }\n\n            char.classList.remove('pose-left', 'pose-right', 'pose-up', 'pose-down');\n            void char.offsetWidth;\n            char.classList.add(pose);\n            \n            score += 150;\n            scoreDisplay.innerText = score.toString().padStart(5, '0');\n            playSound('hit');\n\n            setTimeout(() => char.classList.remove(pose), 200);\n        }\n    });\n</script>\n\n</body>\n</html>"
}
