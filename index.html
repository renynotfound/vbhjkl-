<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Groove - Rhythm Game</title>
    <style>
        :root {
            --hair: #e65c00;
            --skin: #ffe0bd;
            --eyes: #2ecc71;
            --dress: #27ae60;
            --bg: #1a1a2e;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Character Styling */
        #character {
            width: 200px;
            height: 300px;
            margin-top: 50px;
            transition: transform 0.1s;
            transform-origin: bottom center;
        }

        .hair { fill: var(--hair); }
        .skin { fill: var(--skin); }
        .eyes { fill: var(--eyes); }
        .dress { fill: var(--dress); }

        /* UI Styling */
        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #2ecc71;
        }

        #combo-text {
            position: absolute;
            top: 100px;
            font-size: 40px;
            font-weight: bold;
            color: #f1c40f;
            opacity: 0;
            pointer-events: none;
        }

        .animate-combo {
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Controls / Indicators */
        #beat-indicator {
            width: 60px;
            height: 60px;
            border: 4px solid var(--eyes);
            border-radius: 50%;
            margin-top: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #beat-pulse {
            width: 100%;
            height: 100%;
            background: var(--eyes);
            border-radius: 50%;
            opacity: 0.3;
            transform: scale(0.1);
        }

        .pulse-active {
            animation: pulse-kf 1s infinite linear;
        }

        @keyframes pulse-kf {
            0% { transform: scale(0.1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(0.1); opacity: 0.8; }
        }

        .instructions {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        /* Dance Poses */
        .pose-left { transform: rotate(-15deg) translateX(-20px) scaleY(0.95); }
        .pose-right { transform: rotate(15deg) translateX(20px) scaleY(0.95); }
        .pose-up { transform: translateY(-30px) scaleX(0.9); }
        .pose-down { transform: translateY(10px) scaleY(0.8) scaleX(1.1); }

    </style>
</head>
<body>

    <div id="score-board">Score: <span id="score">0</span></div>
    
    <div id="game-container">
        <div id="combo-text">PERFECT!</div>

        <!-- SVG Character -->
        <svg id="character" viewBox="0 0 100 150">
            <!-- Legs -->
            <rect x="35" y="110" width="10" height="30" class="skin" />
            <rect x="55" y="110" width="10" height="30" class="skin" />
            <!-- Shoes -->
            <rect x="30" y="135" width="15" height="5" fill="#333" />
            <rect x="55" y="135" width="15" height="5" fill="#333" />
            <!-- Dress -->
            <path d="M30 60 L70 60 L85 110 L15 110 Z" class="dress" />
            <!-- Arms -->
            <rect id="armL" x="15" y="65" width="8" height="30" class="skin" rx="4" />
            <rect id="armR" x="77" y="65" width="8" height="30" class="skin" rx="4" />
            <!-- Neck -->
            <rect x="45" y="55" width="10" height="10" class="skin" />
            <!-- Face -->
            <circle cx="50" cy="40" r="22" class="skin" />
            <!-- Eyes -->
            <circle cx="42" cy="38" r="3" class="eyes" />
            <circle cx="58" cy="38" r="3" class="eyes" />
            <!-- Mouth -->
            <path d="M45 48 Q50 52 55 48" fill="none" stroke="#e74c3c" stroke-width="1.5" />
            <!-- Hair -->
            <path d="M25 40 Q25 10 50 5 Q75 10 75 40 L80 65 Q50 55 20 65 Z" class="hair" />
            <path d="M35 25 Q50 15 65 25" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1" />
        </svg>

        <div id="beat-indicator">
            <div id="beat-pulse" class="pulse-active"></div>
        </div>

        <div class="instructions">Use ARROW KEYS to Dance to the Beat!</div>
    </div>

    <script>
        let score = 0;
        const scoreEl = document.getElementById('score');
        const character = document.getElementById('character');
        const comboText = document.getElementById('combo-text');
        const pulse = document.getElementById('beat-pulse');

        // Logic to track the "Perfect" window
        // The pulse animation is 1s long. We consider "Perfect" to be near the peak (0.5s)
        function getPulseScale() {
            const style = window.getComputedStyle(pulse);
            const matrix = new WebKitCSSMatrix(style.transform);
            return matrix.a; // Returns the scale value
        }

        window.addEventListener('keydown', (e) => {
            let poseClass = '';
            
            switch(e.key) {
                case 'ArrowLeft': poseClass = 'pose-left'; break;
                case 'ArrowRight': poseClass = 'pose-right'; break;
                case 'ArrowUp': poseClass = 'pose-up'; break;
                case 'ArrowDown': poseClass = 'pose-down'; break;
                default: return;
            }

            // Visual feedback for dance
            character.classList.remove('pose-left', 'pose-right', 'pose-up', 'pose-down');
            void character.offsetWidth; // Trigger reflow
            character.classList.add(poseClass);

            // Scoring Logic
            const scale = getPulseScale();
            // Scale peaks around 1.2. We reward hits between 1.0 and 1.2
            if (scale > 0.9) {
                score += 100;
                showCombo("PERFECT!");
            } else {
                score += 10;
            }
            
            scoreEl.innerText = score;

            // Reset pose after a short delay
            setTimeout(() => {
                character.classList.remove(poseClass);
            }, 150);
        });

        function showCombo(text) {
            comboText.innerText = text;
            comboText.classList.remove('animate-combo');
            void comboText.offsetWidth;
            comboText.classList.add('animate-combo');
        }

        // Optional: Simple synthesizer sound on beat (click browser to enable audio context)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeatSound() {
            if (audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 150;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Sync sound with animation loop roughly
        setInterval(() => {
            // playBeatSound(); // Uncomment this line if you want a kick-drum sound (requires user interaction first)
        }, 1000);

        // Resume audio context on first click
        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        });

    </script>
</body>
</html>
